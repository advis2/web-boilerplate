name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: write    # gh-pages 배포 push 권한

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Corepack 활성화 + pnpm 버전 명시 (latest 받으면 lockfile incompatible)
      - run: corepack enable
      - run: corepack prepare pnpm@8.6.11 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm --version

      - run: pnpm install --frozen-lockfile

      # 1. 정적 검증 (lint + typecheck) — PR 회귀 가드
      - name: Lint
        run: pnpm nx run-many -t lint --parallel=3

      - name: Typecheck
        run: pnpm nx run-many -t typecheck --parallel=3

      # 2. Test (test 타겟이 있는 프로젝트만 자동 실행, 없으면 noop)
      - name: Test
        run: pnpm nx run-many -t test --parallel=3 --passWithNoTests

      # 3. Build the Next.js site (정적 export)
      #    CI runner는 GITHUB_ACTIONS=true 자동 — next.config.js의 basePath 적용
      - name: Build Next.js site
        run: pnpm nx build portfolio

      # 4. Build 산출물 검증 + Jekyll 비활성화 (_next/ 폴더 보호)
      - name: Prepare deploy artifacts
        run: |
          ls -la dist/apps/portfolio/out/index.html
          touch dist/apps/portfolio/out/.nojekyll
          ls -la dist/apps/portfolio/out/.nojekyll

      # 5. Deploy to GitHub Pages (master push 시에만)
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/apps/portfolio/out
          enable_jekyll: false
