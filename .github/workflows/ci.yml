name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  actions: read
  contents: write    # 배포 및 푸시 작업을 위한 쓰기 권한
  id-token: write    # GitHub Actions에서 JWT 토큰을 생성할 수 있는 권한 (선택 사항, 보안 관련)

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Corepack 활성화 → pnpm 사용
      - run: corepack enable
      - run: corepack prepare pnpm@latest --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm --version

      # pnpm 의존성 설치
      - run: pnpm install --frozen-lockfile

      # 1. 정적 검증 (lint + typecheck) — PR 회귀 가드
      - name: Lint
        run: pnpm nx run-many -t lint --parallel=3

      - name: Typecheck
        run: pnpm nx run-many -t typecheck --parallel=3

      # 2. Test (test 타겟이 있는 프로젝트만 자동 실행, 없으면 noop)
      - name: Test
        run: pnpm nx run-many -t test --parallel=3 --passWithNoTests

      # 3. Build the Next.js site (정적 export)
      - name: Build Next.js site
        run: pnpm nx build portfolio

      # 4. Deploy to GitHub Pages (master push 시에만)
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/apps/portfolio/out

      # Nx Cloud self-healing (연결 안 했으면 noop)
      - run: npx nx fix-ci
        if: always()
